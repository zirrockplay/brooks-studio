<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вход | Brooks Studio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="page">

    <!-- навигация -->
    <header class="header">
        <div class="header__container">
            <a href="index.html" class="header__logo">BROOKS STUDIO</a>
            <nav class="nav">
                <ul class="nav__list">
                    <li class="nav__item"><a href="collection.html" class="nav__link">Коллекция</a></li>
                    <li class="nav__item"><a href="404.html" class="nav__link">Экспозиция</a></li>
                    <li class="nav__item"><a href="404.html" class="nav__link">Манифест</a></li>
                </ul>
            </nav>
            <button class="button button--login" onclick="window.location.href='login.html'">Войти</button>
        </div>
    </header>

    <!-- форма авторизации -->
    <main class="auth">
        <div class="auth__container">
            <div class="auth__header">
                <h1 class="auth__title">Добро пожаловать</h1>
                <p class="auth__subtitle">Войдите в свой аккаунт, чтобы продолжить</p>
            </div>

            <form class="form" id="loginForm">
                <div class="form__group">
                    <label for="email" class="form__label">Электронная почта</label>
                    <input type="email" id="email" name="email" placeholder="studio@donbrooks.com" class="input input--minimal" required>
                </div>

                <div class="form__group">
                    <label for="password" class="form__label">Пароль</label>
                    <input type="password" id="password" name="password" placeholder="••••••••••••" class="input input--minimal" required>
                </div>

                <button type="submit" class="button button--submit button--submit-full">Войти</button>

                <div class="auth__divider">
                    <span>или</span>
                </div>

                <div class="auth__social">
                    <button type="button" class="auth__social-btn auth__social-btn--google">
                        <i class="fa-brands fa-google"></i> Войти через Google
                    </button>
                </div>

                <p class="auth__footer">
                    Нет аккаунта? <a href="index.html" class="auth__link">Зарегистрироваться</a>
                </p>
            </form>
        </div>
    </main>

    <!-- футер -->
    <footer class="footer">
        <div class="footer__container">
            <p class="footer__copyright">© 1998–2026 Brooks Studio</p>
            <div class="footer__social">
                <a href="#" class="footer__social-link" target="_blank"><i class="fa-brands fa-youtube"></i></a>
                <a href="#" class="footer__social-link" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#" class="footer__social-link" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script>
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('Пожалуйста, заполните все поля');
                return;
            }
            
            if (!email.includes('@')) {
                alert('Введите корректный email');
                return;
            }
            
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userEmail', email);
            
            window.location.href = 'index.html';
        });
        
        const googleBtn = document.querySelector('.auth__social-btn--google');
        if (googleBtn) {
            googleBtn.addEventListener('click', () => {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', 'user@gmail.com');
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
